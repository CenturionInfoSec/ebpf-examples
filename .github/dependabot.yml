# Dependabot configuration - synced from CenturionInfoSec/infrastructure-prod
# To customize: create .github/SKIP_DEPENDABOT_SYNC and use your own config
# Docs: https://github.com/CenturionInfoSec/infrastructure-prod/tree/main/dependabot-sync
#
# Dependabot silently skips ecosystems with no matching manifests in the repo,
# so it is safe to list every ecosystem everywhere. The one exception is the
# pip/uv overlap: a uv-managed project has a pyproject.toml, which the pip
# ecosystem also claims — but pip never regenerates uv.lock, so it would leave
# the lockfile drifted. To prevent that, the sync GENERATES the pip block below
# per-repo: it replaces pip's `directories` with only the repo's genuine (non-uv)
# pip projects, and removes the pip block entirely from a pure-uv repo. (An
# earlier version used pip `exclude-paths`, but Dependabot ignores exclude-paths
# when the block scans `directories: ["/**"]`.)
#
# Every group is restricted to `update-types: ["minor", "patch"]`. Major bumps
# leave the group and arrive as individual PRs so their metadata is unambiguous
# and they get isolated review — the auto-merge evaluator holds major direct
# production dependencies for a human (see dependabot-sync-03-evaluate-pr.yml).

version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directories:
      - "/**"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 28
    open-pull-requests-limit: 25
    groups:
      github-actions:
        update-types: ["minor", "patch"]
        patterns: ["*"]

  # Python via uv (pyproject.toml + uv.lock — preferred for uv-managed projects)
  - package-ecosystem: "uv"
    directories:
      - "/**"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 28
    open-pull-requests-limit: 25
    groups:
      uv-deps:
        update-types: ["minor", "patch"]
        patterns: ["*"]

