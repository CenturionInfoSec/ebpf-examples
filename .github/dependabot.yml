# Dependabot configuration - synced from CenturionInfoSec/infrastructure-prod
# To customize: create .github/SKIP_DEPENDABOT_SYNC and use your own config
# Docs: https://github.com/CenturionInfoSec/infrastructure-prod/tree/main/dependabot-sync
#
# Dependabot silently skips ecosystems with no matching manifests in the repo.

version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directories:
      - "/**"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 28
    open-pull-requests-limit: 25
    groups:
      github-actions:
        patterns: ["*"]

  # Python via uv (pyproject.toml + uv.lock — preferred for uv-managed projects)
  - package-ecosystem: "uv"
    directories:
      - "/**"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 28
    open-pull-requests-limit: 25
    groups:
      uv-deps:
        patterns: ["*"]

  # Python via pip (requirements.txt, Pipfile, setup.py — for non-uv projects)
  - package-ecosystem: "pip"
    directories:
      - "/**"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 28
    open-pull-requests-limit: 25
    groups:
      python-deps:
        patterns: ["*"]

  # Node.js (package.json)
  - package-ecosystem: "npm"
    directories:
      - "/**"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 28
    open-pull-requests-limit: 25
